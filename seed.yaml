# Ouroboros Seed — API 인터페이스 타입 자동 생성
# Generated from interview session: interview_20260410_055556
# Date: 2026-04-10

goal: >
  NestJS 백엔드 코드(yjlaser_website/webhard-api/)를 파싱하여
  하위 프로그램(관리프로그램, 네스팅프로그램, 외부웹하드동기화프로그램)이
  사용할 공유 API 타입 정의 파일을 자동 생성하는 TypeScript 스크립트를 구현한다.
  이를 통해 필드명, enum, 엔드포인트 등의 인터페이스 불일치 문제를 해결한다.

constraints:
  - NestJS 백엔드 코드(webhard-api/src/)가 진실 공급원(source of truth)
  - 스크립트는 TypeScript/Node.js로 작성 (ts-morph 사용)
  - 스크립트는 루트 디렉토리 scripts/ 폴더에 배치
  - 의존성은 루트 package.json에 devDependency로 추가
  - Python 출력 파일에서도 camelCase 유지 (API와 동일한 네이밍)
  - 생성된 파일은 git에 커밋 (.gitignore에 추가하지 않음)
  - 기존 프로그램 코드의 하드코딩 교체는 이번 범위 제외 (후속 작업)
  - computeroff 프로그램은 대상에서 제외
  - Python 3.8 호환 (관리프로그램, 네스팅프로그램 요구사항)

acceptance_criteria:
  - 루트에 scripts/generate-api-types.ts 스크립트가 존재하고 실행 가능
  - 루트 package.json에 "generate:types" 스크립트 명령어가 등록됨
  - 스크립트 실행 시 유진레이저목형 관리프로그램/generated/api_types.py 생성
  - 스크립트 실행 시 레이저네스팅프로그램/generated/api_types.py 생성
  - 스크립트 실행 시 외부웹하드동기화프로그램/src/generated/api_types.ts 생성
  - 생성된 Python 파일에 ContactStatus, ProcessStage, DeliveryStatus 등 enum 상수 포함
  - 생성된 Python 파일에 API 엔드포인트 경로/메서드 정의 포함
  - 생성된 Python 파일에 요청/응답 타입 정의(TypedDict) 포함
  - 생성된 TypeScript 파일에 동일한 enum, 엔드포인트, interface 정의 포함
  - 생성된 타입 정의가 NestJS 소스(enum/DTO/컨트롤러)와 일치하는지 검증 통과
  - 각 프로그램에서 generated 파일을 import하여 정상 사용 가능

ontology_schema:
  name: ApiTypeGenerator
  description: NestJS 백엔드에서 공유 API 타입 정의를 추출/생성하는 도메인 모델
  fields:
    - name: enums
      type: array
      description: NestJS에서 추출한 enum 정의 목록 (ContactStatus, ProcessStage, DeliveryStatus, InventoryCategory 등)
    - name: endpoints
      type: array
      description: API 엔드포인트 정의 (경로, HTTP 메서드, 설명)
    - name: requestTypes
      type: array
      description: 요청 body 타입 정의 (필드명, 타입, 필수여부)
    - name: responseTypes
      type: array
      description: 응답 타입 정의 (필드명, 타입)
    - name: stateTransitions
      type: object
      description: 상태 전환 규칙 (현재상태 → 전환 가능 상태 목록)
    - name: outputFiles
      type: array
      description: 생성할 출력 파일 목록 (경로, 언어, 포맷)

evaluation_principles:
  - name: completeness
    description: NestJS 백엔드의 모든 Integration API enum/DTO/엔드포인트가 빠짐없이 추출되었는가
    weight: 0.3
  - name: accuracy
    description: 생성된 타입 정의가 NestJS 소스와 정확히 일치하는가 (필드명, 타입, enum 값)
    weight: 0.3
  - name: usability
    description: 각 프로그램에서 generated 파일을 바로 import하여 사용할 수 있는가
    weight: 0.2
  - name: maintainability
    description: API 변경 시 스크립트 재실행만으로 모든 파일이 올바르게 업데이트되는가
    weight: 0.2

exit_conditions:
  - name: all_types_generated
    description: 3개 프로그램 모두에 대해 generated 파일이 정상 생성됨
    criteria: 유진레이저목형 관리프로그램/generated/api_types.py, 레이저네스팅프로그램/generated/api_types.py, 외부웹하드동기화프로그램/src/generated/api_types.ts 존재
  - name: source_match_verified
    description: 생성된 파일의 enum/타입이 NestJS 소스와 일치
    criteria: 검증 스크립트 또는 수동 비교로 불일치 0건 확인
  - name: import_verified
    description: 각 프로그램에서 generated 파일 import 성공
    criteria: Python에서 import generated.api_types, TypeScript에서 import from generated/api_types 성공

